<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHATBOT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="shell sidebar-open" id="appShell">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <button class="new-chat-btn" onclick="newChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>
      <button class="nav-btn mcp-toggle-icon" data-tip="MCP Tools" onclick="toggleMcpPanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      </button>
    </div>
    
    <div class="sidebar-history" id="historyList">
      <div style="font-size:12px;color:#4b5563;padding:12px 0">No history yet</div>
    </div>

    <div class="sidebar-status">
      <div class="status-dot" id="wsStatus"></div>
      <span class="status-text">System connected</span>
    </div>
  </aside>

  <main class="main">

    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn sidebar-toggle-btn" onclick="toggleSidebar()" title="Toggle Sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">CHATBOT</span>
        <span class="agent-pills" id="activePills"></span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn stats-btn" id="statsBtn" title="Cost &amp; Cache Stats" onclick="toggleStatsPanel()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </button>
        <div class="conn-badge" id="connBadge"></div>
      </div>
    </header>

    <!-- Cost / Cache Stats Panel -->
    <div class="stats-panel" id="statsPanel">
      <div class="mcp-header">
        <span>Cost &amp; Cache Savings</span>
        <button onclick="toggleStatsPanel()">✕</button>
      </div>
      <div class="stats-body" id="statsBody">
        <div class="stat-grid" id="statGrid">Loading…</div>
        <div style="margin-top:16px">
          <div class="section-lbl">Recent requests</div>
          <div id="statHistory" class="stat-history"></div>
        </div>
      </div>
    </div>

    <div class="mcp-panel" id="mcpPanel">
      <div class="mcp-header">
        <span>MCP Server Tools</span>
        <button onclick="toggleMcpPanel()">✕</button>
      </div>
      <div class="mcp-tools" id="mcpTools">Loading…</div>
    </div>

    <!-- Centered layout wrapper -->
    <div class="chat-container chat-empty" id="chatContainer">
      
      <div class="greeting-title">
        <span class="greeting-hi">Hello.</span><br>
        <span class="greeting-sub">How can the agents help you today?</span>
      </div>

      <div class="pdf-banner" id="pdfBanner" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span id="pdfBannerText">PDF loaded</span>
        <button onclick="clearPdf()" title="Clear PDF">✕</button>
      </div>

      <div class="chat-window" id="chat"></div>

      <div class="waveform-bar" id="waveformBar">
        <div class="waveform-inner">
          <canvas id="waveCanvas" width="260" height="40"></canvas>
          <span id="micTimer">0:00</span>
          <button class="stop-mic-btn" onclick="stopMic()">■ Stop</button>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-dock">
        <div class="input-row">

          <div class="attachment-wrapper" id="attachmentWrapper">
            <button class="icon-btn plus-btn" id="plusBtn" title="Attach file" onclick="toggleAttachmentMenu()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            </button>
            <div class="attachment-menu" id="attMenu">
              <label class="att-item" title="Upload PDF">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                <span>Upload Document</span>
                <input type="file" id="pdfFile" accept=".pdf,application/pdf" hidden />
              </label>

              <label class="att-item" title="Upload Audio">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
                <span>Upload Audio</span>
                <input type="file" id="audioFile" accept="audio/*" hidden />
              </label>

              <label class="att-item" title="Upload Video">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
                <span>Upload Video</span>
                <input type="file" id="videoFile" accept="video/*" hidden />
              </label>
            </div>
          </div>

          <button class="icon-btn mic-btn" id="micBtn" title="Speak" onclick="toggleMic()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 19v3M8 22h8"/></svg>
          </button>

          <div class="input-wrap">
            <input id="msgInput" type="text" placeholder="Message the agents…" autocomplete="off" />
          </div>

          <button class="icon-btn send-btn" id="sendBtn" title="Send" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>

        </div>
      </div>
    </div> <!-- end .chat-container -->

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
